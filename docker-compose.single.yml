version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: trybe
      POSTGRES_PASSWORD: trybe_dev
      POSTGRES_DB: trybe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trybe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

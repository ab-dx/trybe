<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "secondary-container": "#d2e2ea",
                  "surface-bright": "#fdf8f7",
                  "surface": "#fdf8f7",
                  "tertiary-fixed": "#ffddbb",
                  "on-error-container": "#93000a",
                  "on-primary-fixed": "#201b15",
                  "inverse-primary": "#cfc5bc",
                  "secondary-fixed-dim": "#b9c9d1",
                  "inverse-on-surface": "#f5f0ee",
                  "primary-fixed-dim": "#cfc5bc",
                  "tertiary-container": "#4c2c00",
                  "on-tertiary-fixed": "#2b1700",
                  "on-secondary-container": "#56656c",
                  "surface-container": "#f2edeb",
                  "on-secondary": "#ffffff",
                  "surface-dim": "#ddd9d7",
                  "error": "#ba1a1a",
                  "inverse-surface": "#32302f",
                  "surface-container-low": "#f7f3f1",
                  "tertiary-fixed-dim": "#f7bb78",
                  "on-tertiary": "#ffffff",
                  "primary": "#221d18",
                  "on-tertiary-fixed-variant": "#663e04",
                  "on-secondary-fixed": "#0f1e23",
                  "on-error": "#ffffff",
                  "secondary": "#526168",
                  "surface-variant": "#e6e1e0",
                  "primary-container": "#38322c",
                  "on-primary": "#ffffff",
                  "on-background": "#1c1b1b",
                  "surface-tint": "#655d56",
                  "on-surface": "#1c1b1b",
                  "error-container": "#ffdad6",
                  "outline": "#7e766e",
                  "on-primary-fixed-variant": "#4c463f",
                  "on-surface-variant": "#4c463f",
                  "tertiary": "#2f1900",
                  "secondary-fixed": "#d5e5ed",
                  "surface-container-highest": "#e6e1e0",
                  "on-primary-container": "#a39a92",
                  "outline-variant": "#cfc5bc",
                  "primary-fixed": "#ece1d8",
                  "surface-container-high": "#ece7e6",
                  "surface-container-lowest": "#ffffff",
                  "on-secondary-fixed-variant": "#3a4950",
                  "on-tertiary-container": "#c79152",
                  "background": "#fdf8f7"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "sm": "12px",
                  "xs": "8px",
                  "md": "16px",
                  "lg": "24px",
                  "gutter": "16px",
                  "margin": "24px",
                  "3xl": "64px",
                  "base": "4px",
                  "xl": "32px",
                  "2xl": "48px"
          },
          "fontFamily": {
                  "body-md": ["Inter"],
                  "display-lg": ["Plus Jakarta Sans"],
                  "body-lg": ["Inter"],
                  "label-lg": ["Inter"],
                  "headline-md": ["Plus Jakarta Sans"],
                  "label-sm": ["Inter"],
                  "headline-lg": ["Plus Jakarta Sans"]
          },
          "fontSize": {
                  "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                  "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                  "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                  "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                  "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "500"}],
                  "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
          }
        },
      },
    }

<style>
    body {
      background-color: #D8CFC0;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#D8CFC0] dark:bg-stone-900 text-[#38322C] dark:text-stone-100 font-sans tracking-tight font-semibold fixed top-0 w-full z-50 border-b border-[#38322C]/10 dark:border-stone-800 shadow-sm dark:shadow-none">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-screen-xl mx-auto">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">help</span>
</button>
<h1 class="text-2xl font-bold tracking-widest text-[#38322C] dark:text-stone-50">TRYBE</h1>
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="portrait of a confident woman with natural hair, outdoor soft lighting, warm earthy background tone" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWThwMVYVGPd5z0aaP8BH1ihB5UA9Vpka9shRwPTCrD43Jtg3kyGXEaVwxIz1zwpwy1YD71Y1wwYWhMMjLreMuM-CmDr7osDCBNcgBNHGEzM3tPZrbz2PYI4mw3wZGwl9XNAiaf14BiSqD3IzTEQUz0_YuTrJOxxyHqH8oG0k8H3Y5YGzDsc4R_OyxrgCeJ65QrUCOQnyYKHk4f0M2FfqcRh41oq96L02bp7A61KxbXwsl8k0od1hM8YTXyhuQRNQouRxScn7RoVA"/>
</div>
</div>
</header>
<main class="pt-24 px-margin max-w-2xl mx-auto">
<!-- Screen Header -->
<div class="mb-xl">
<h2 class="font-headline-lg text-headline-lg text-primary mb-xs">Host an Activity</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Gather your tribe and create a new experience.</p>
</div>
<!-- Form Section -->
<form class="space-y-xl">
<!-- Activity Title -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-primary" for="title">Activity Title</label>
<input class="w-full bg-[#E2DACF] border-secondary/20 border-[1.5px] rounded-xl px-lg py-md text-body-md focus:ring-2 focus:ring-tertiary-container focus:border-tertiary-container outline-none transition-all placeholder:text-on-surface-variant/40" id="title" placeholder="e.g. Sunset 5K Run, Acoustic Jam..." type="text"/>
</div>
<!-- Start Time -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-primary" for="time">Start Time</label>
<div class="relative">
<input class="w-full bg-[#E2DACF] border-secondary/20 border-[1.5px] rounded-xl px-lg py-md text-body-md focus:ring-2 focus:ring-tertiary-container focus:border-tertiary-container outline-none transition-all" id="time" type="datetime-local"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-secondary pointer-events-none">calendar_today</span>
</div>
</div>
<!-- Description -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-primary" for="description">Description (Optional)</label>
<textarea class="w-full bg-[#E2DACF] border-secondary/20 border-[1.5px] rounded-xl px-lg py-md text-body-md focus:ring-2 focus:ring-tertiary-container focus:border-tertiary-container outline-none transition-all placeholder:text-on-surface-variant/40 resize-none" id="description" placeholder="What's the plan?" rows="4"></textarea>
</div>
<!-- Map Location -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-primary">Exact Location</label>
<div class="relative group rounded-xl overflow-hidden shadow-[0_4px_16px_rgba(56,50,44,0.08)] bg-surface-container">
<div class="aspect-video w-full bg-surface-variant relative overflow-hidden">
<!-- Simulated Map Background -->
<img class="w-full h-full object-cover grayscale opacity-60" data-alt="stylized minimalist aerial map view with warm beige and charcoal tones, simplified road lines and soft shadows" data-location="Austin, Texas" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAoWhvpxfX_hcG0BZHukbBJsFZa_7kib2GH_alRhIYI-o-0thZk9o4JUoHYqe2dAAaK2l1gyCyHnXBM9txH8lVuhgm-GAFV7xr61cpjCU8L1ayM6DapPa9He0k1zfD_YUFhWMLPHth6NFTf5sT46jesVtkjgy5HOKRp8jDSM10_uzSLBUtfamqYETVhhqS0j8w8Oc0t4a39PyfD2tcjaeh_EJtYTolAO9v1zXhqkVn5DeJqPuFMfDyzidCgxp17mYPu4nz8ICx3Pyg"/>
<!-- Map Pin Overlay -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-4xl text-tertiary-container drop-shadow-md" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="w-2 h-1 bg-primary/20 rounded-full blur-[2px]"></div>
</div>
</div>
<!-- Map Controls -->
<div class="absolute top-4 right-4 flex flex-col gap-2">
<button class="bg-surface p-2 rounded-lg shadow-md text-primary active:scale-95 transition-transform" type="button">
<span class="material-symbols-outlined">add</span>
</button>
<button class="bg-surface p-2 rounded-lg shadow-md text-primary active:scale-95 transition-transform" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</div>
<div class="bg-[#E2DACF] px-md py-sm border-t border-primary/5">
<p class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">touch_app</span>
              Hold and drag the pin to adjust
            </p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-lg flex flex-col gap-md">
<button class="w-full bg-primary text-[#D8CFC0] font-label-lg text-label-lg py-lg rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
          Create Activity
        </button>
<button class="w-full bg-transparent border-[1.5px] border-primary text-primary font-label-lg text-label-lg py-lg rounded-xl hover:bg-primary/5 active:scale-[0.98] transition-all" type="button">
          Save as Draft
        </button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="bg-[#D8CFC0] dark:bg-stone-900 text-[#38322C] dark:text-stone-100 fixed bottom-0 w-full z-50 rounded-t-3xl border-t border-[#38322C]/5 dark:border-stone-800 shadow-[0_-4px_16px_rgba(56,50,44,0.08)]">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3">
<!-- Feed -->
<a class="flex flex-col items-center justify-center text-[#38322C]/50 dark:text-stone-500 hover:text-[#38322C] dark:hover:text-stone-200 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined">dynamic_feed</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-wider">Feed</span>
</a>
<!-- Map -->
<a class="flex flex-col items-center justify-center text-[#38322C]/50 dark:text-stone-500 hover:text-[#38322C] dark:hover:text-stone-200 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined">map</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-wider">Map</span>
</a>
<!-- Activity (Active) -->
<a class="flex flex-col items-center justify-center text-[#38322C] dark:text-stone-50 bg-[#E2DACF] dark:bg-stone-800 rounded-xl px-3 py-1 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-wider">Activity</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#38322C]/50 dark:text-stone-500 hover:text-[#38322C] dark:hover:text-stone-200 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-wider">Profile</span>
</a>
</div>
</nav>
</body></html>
